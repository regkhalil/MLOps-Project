apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: mlops-ui:latest
          imagePullPolicy: Never
          env:
            - name: API_URL
              value: http://api:8000
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: mlops
spec:
  selector:
    app: ui
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30850
  type: NodePort
